<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Jukebox Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--img-w:1570;--img-h:2048;}
body{
margin:0;
background:
radial-gradient(circle at 15% 20%, rgba(122, 55, 255, 0.35) 0%, transparent 42%),
radial-gradient(circle at 85% 75%, rgba(255, 54, 190, 0.28) 0%, transparent 38%),
linear-gradient(135deg,#07030f 0%,#140822 45%,#06030d 100%);
background-size:140% 140%,140% 140%,100% 100%;
font-family:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:#fff;
display:flex;
min-height:100vh;
align-items:center;
justify-content:center;
padding:24px;
box-sizing:border-box;
position:relative;
overflow:hidden;
animation:bgShift 16s ease-in-out infinite alternate;
}
body::before{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.28;
background:
repeating-linear-gradient(0deg,rgba(255,255,255,.06) 0 2px,transparent 2px 6px),
repeating-linear-gradient(90deg,rgba(76,245,255,.09) 0 2px,transparent 2px 8px);
background-size:100% 100%,100% 100%;
mix-blend-mode:screen;
animation:pixelDrift 8s steps(16,end) infinite;
}
body::after{
content:"";
position:fixed;
inset:0;
pointer-events:none;
opacity:.42;
background-image:
radial-gradient(circle, rgba(255,255,255,.85) 0 1.2px, transparent 1.2px),
radial-gradient(circle, rgba(121,233,255,.8) 0 1px, transparent 1px),
radial-gradient(circle, rgba(255,122,224,.75) 0 1px, transparent 1px);
background-size:180px 180px,220px 220px,260px 260px;
background-position:0 0,40px 70px,100px 30px;
animation:starTwinkle 4.6s ease-in-out infinite;
}
.stage{
width:min(520px,95vw);
position:relative;
padding:0;
border-radius:0;
background:transparent;
box-shadow:none;
overflow:visible;
}
.jukebox-wrap{
position:relative;
width:100%;
aspect-ratio:1570/2048;
user-select:none;
background:var(--jukebox-skin) center center/contain no-repeat;
}
.overlay{position:absolute;inset:0;}
.screen{
position:absolute;pointer-events:none;display:flex;align-items:center;justify-content:center;text-align:center;
padding:0.6%;box-sizing:border-box;font-family:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
text-shadow:0 0 10px rgba(120,255,255,.35);color:rgba(200,255,255,.9);
}
.screen small{display:block;opacity:.9;font-weight:600;}
.topText{font-size:clamp(10px,2vw,18px);line-height:1.1;}
.midText{font-size:clamp(8px,1.5vw,14px);line-height:1.15;}
@keyframes midFloat{
0%{transform:translateY(0);}
50%{transform:translateY(-2px);}
100%{transform:translateY(0);}
}
@keyframes rainbowText{
0%{color:#fdfcff;}
20%{color:#ff8ad4;}
40%{color:#ffe66b;}
60%{color:#7dffb8;}
80%{color:#7dd3ff;}
100%{color:#fdfcff;}
}
@keyframes bgShift{
0%{background-position:0% 0%,100% 100%,0 0;}
100%{background-position:100% 100%,0% 0%,0 0;}
}
@keyframes pixelDrift{
0%{transform:translate3d(0,0,0);}
25%{transform:translate3d(-8px,6px,0);}
50%{transform:translate3d(10px,-6px,0);}
75%{transform:translate3d(-6px,-10px,0);}
100%{transform:translate3d(0,0,0);}
}
@keyframes starTwinkle{
0%,100%{opacity:.24;filter:drop-shadow(0 0 2px rgba(255,255,255,.4));}
50%{opacity:.52;filter:drop-shadow(0 0 8px rgba(156,239,255,.9));}
}
@keyframes sparkle{
0%,100%{text-shadow:0 0 10px rgba(120,255,255,.35),0 0 0 rgba(255,255,255,0);}
50%{text-shadow:0 0 10px rgba(120,255,255,.6),0 0 12px rgba(255,255,255,.9);}
}
.mid-anim{animation:midFloat 1.2s ease-in-out infinite, rainbowText 3s linear infinite;}
.top-anim{animation:midFloat 1.2s ease-in-out infinite, rainbowText 3s linear infinite, sparkle 1.4s ease-in-out infinite;}
.hit{
position:absolute;
border:0;
padding:0;
margin:0;
background:rgba(0,0,0,.35);
cursor:pointer;
border-radius:10%;
display:flex;
align-items:center;
justify-content:center;
white-space:nowrap;
font-family:"Space Grotesk",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
font-weight:600;
font-size:clamp(7px,1.1vw,10px);
letter-spacing:.03em;
text-transform:uppercase;
color:rgba(255,255,255,.92);
text-shadow:0 0 6px rgba(0,0,0,.75);
border:1px solid rgba(255,255,255,.3);
box-shadow:0 0 8px rgba(255,255,255,.35);
backdrop-filter:blur(3px);
}
.small-label{font-size:clamp(6px,0.9vw,8px);}
.tiny-label{font-size:clamp(5px,0.75vw,7px);}
.micro-label{font-size:clamp(4.5px,0.68vw,6px);}
.transport{
background:none;
border:none;
box-shadow:none;
border-radius:0;
font-size:12px;
animation:rainbowText 3s linear infinite;
}
.hidden{display:none;}
.hit:active{transform:translateY(1px);}
.controls{margin-top:14px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap;}
.controls label{display:flex;align-items:center;gap:8px;opacity:.9;font-size:14px;}
.now{opacity:.9;font-size:14px;line-height:1.3;}
</style>
</head>

<body>

<div class="stage">

<div id="wrap" class="jukebox-wrap">

<div class="overlay">

<div id="topScreen" class="screen topText"
style="left:34.8%;top:27.4%;width:30.6%;height:8.8%;">
<div><small>JUKEBOX</small>READY</div>
</div>

<div id="midScreen" class="screen midText"
style="left:40.0%;top:39.0%;width:20.8%;height:6.9%;">
<div id="midText"><small>STATUS</small>Select a genre</div>
</div>

<button class="hit transport" data-action="play"
style="left:33.7%;top:41.8%;width:2.3%;height:2.3%;">▶</button>

<button class="hit transport" data-action="pause"
style="left:33.7%;top:41.8%;width:2.3%;height:2.3%;">❚❚</button>

<button class="hit genre" data-genre="Pop"
style="left:42.3%;top:49.8%;width:5.7%;height:2.9%;">Pop</button>

<button class="hit genre micro-label" data-genre="Acoustic"
style="left:52.8%;top:49.8%;width:5.7%;height:2.9%;">Acoustic</button>

<button class="hit genre" data-genre="Trap"
style="left:42.2%;top:55.0%;width:5.7%;height:2.8%;">Trap</button>

<button class="hit genre" data-genre="Drill"
style="left:52.8%;top:55.0%;width:5.7%;height:2.8%;">Drill</button>

<button class="hit genre" data-genre="Punk"
style="left:42.3%;top:60.3%;width:5.7%;height:2.8%;">Punk</button>

<button class="hit genre" data-genre="Jazz"
style="left:52.8%;top:60.3%;width:5.7%;height:2.8%;">Jazz</button>

<button class="hit genre small-label" data-genre="Disco"
style="left:42.3%;top:65.6%;width:5.7%;height:2.8%;">Disco</button>

<button class="hit genre tiny-label" data-genre="Random"
style="left:52.8%;top:65.6%;width:5.7%;height:2.8%;">Random</button>

</div>
</div>

<div class="controls">
<div class="now" id="nowLine"><b>Now:</b> nothing playing</div>
</div>

<audio id="player"></audio>

</div>

<script>

const library={
Pop:[{title:"Pop Track",src:"audio/pop1.mp3"}],
Acoustic:[{title:"Acoustic",src:"audio/jazz1.mp3"}],
Trap:[{title:"Trap Track",src:"audio/hiphop1.mp3"}],
Drill:[{title:"Drill Track",src:"audio/edm1.mp3"}],
Punk:[{title:"Punk Track",src:"audio/rock1.mp3"}],
Jazz:[{title:"Jazz Track",src:"audio/jazz1.mp3"}],
Disco:[{title:"Disco Track",src:"audio/disco1.mp3"}]
};

const skinMap={
Pop:"jukebox.png?v=3",
Acoustic:"acoustic.png?v=3",
Trap:"trap.png?v=3",
Drill:"drill.png?v=3",
Punk:"punk.png?v=3",
Jazz:"acoustic.png?v=3",
Disco:"punk.png?v=3"
};

const wrap=document.getElementById("wrap");
const topScreen=document.getElementById("topScreen");
const midText=document.getElementById("midText");
const nowLine=document.getElementById("nowLine");
const player=document.getElementById("player");
const playBtn=document.querySelector('.transport[data-action="play"]');
const pauseBtn=document.querySelector('.transport[data-action="pause"]');
let playState="stopped";

function setSkin(genre){
const skin=skinMap[genre] || skinMap.Pop;
wrap.style.setProperty("--jukebox-skin",`url("${skin}")`);
}
setSkin("Pop");

function updateTransportUI(){
if(playState==="stopped"){
playBtn.classList.remove("hidden");
pauseBtn.classList.add("hidden");
}else if(playState==="playing"){
playBtn.classList.add("hidden");
pauseBtn.classList.remove("hidden");
}else if(playState==="paused"){
playBtn.classList.remove("hidden");
pauseBtn.classList.add("hidden");
}
}
updateTransportUI();

function playTrack(track){
player.src=track.src;
player.play();
playState="playing";
updateTransportUI();
midText.innerHTML=`Enjoy the music ♪`;
midText.classList.add("mid-anim");
topScreen.classList.add("top-anim");
topScreen.innerHTML=`<div><small>NOW PLAYING</small>${track.title}</div>`;
nowLine.innerHTML=`<b>Now:</b> ${track.title}`;
}

function playGenre(genre){
if(genre==="Random"){
const keys=Object.keys(library);
genre=keys[Math.floor(Math.random()*keys.length)];
}
const tracks=library[genre];
if(!tracks)return;
setSkin(genre);
const track=tracks[Math.floor(Math.random()*tracks.length)];
playTrack(track);
}

document.querySelectorAll(".genre").forEach(btn=>{
btn.addEventListener("click",()=>playGenre(btn.dataset.genre));
});

document.querySelectorAll(".transport").forEach(btn=>{
btn.addEventListener("click",()=>{
const action=btn.dataset.action;
if(action==="play"){
if(player.src){
player.play();
playState="playing";
midText.innerHTML=`Enjoy the music ♪`;
midText.classList.add("mid-anim");
topScreen.classList.add("top-anim");
}
}else if(action==="pause"){
player.pause();
playState="paused";
midText.innerHTML=`<small>STATUS</small>Paused`;
midText.classList.remove("mid-anim");
topScreen.classList.remove("top-anim");
}
updateTransportUI();
});
});

player.addEventListener("ended",()=>{
playState="stopped";
updateTransportUI();
topScreen.innerHTML=`<div><small>JUKEBOX</small>READY</div>`;
midText.innerHTML=`<small>STATUS</small>Select a genre`;
midText.classList.remove("mid-anim");
topScreen.classList.remove("top-anim");
nowLine.innerHTML=`<b>Now:</b> nothing playing`;
});
</script>

</body>
</html>
